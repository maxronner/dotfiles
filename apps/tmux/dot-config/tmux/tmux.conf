# ==============================================================================
# --- Core Settings ---
# ==============================================================================

# --- General ---
setw -g mode-keys vi
set -g mouse on
set -g monitor-bell on
set -g @scripts $XDG_CONFIG_HOME/tmux/scripts

# --- Sensible defaults ---
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g detach-on-destroy off

# --- Layout ---
setw -g aggressive-resize on

# --- Indexing ---
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# --- Status ---
set -g status-interval 5
set -g status-position top

# --- Naming ---
set -g automatic-rename on
set -g allow-rename on
set -g automatic-rename-format '#{?#{m/r:^ssh,#{pane_current_command}},#{pane_title},#{pane_current_command}}'

# ==============================================================================
# --- UI & Appearance ---
# ==============================================================================

set -g default-terminal "tmux-256color"
set -g popup-border-style fg=colour5,bg=default

source-file $XDG_CONFIG_HOME/tmux/theme.conf

# ==============================================================================
# --- Keybindings ---
# ==============================================================================

# --- Prefix ---
unbind C-b
set -g prefix C-Space

bind A send-prefix

# --- Essentials ---
bind C source-file $XDG_CONFIG_HOME/tmux/tmux.conf
bind H set status

bind e run-shell "tmux switch-client -l \
    || tmux switch-client -p \
    || tmux display-message 'No other clients active'"

# --- Window & Pane Management ---
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

bind Space last-window
bind C-Space last-pane

bind X confirm-before -p "kill other panes? (y/n)" "kill-pane -a"

# --- Navigation ---
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# --- Copy Mode ---
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi Escape send -X cancel

# --- Utilities ---
bind-key = command-prompt -p "calc:" "run-shell \"#{@scripts}/calc \'%%\'\""
bind q command-prompt -p "web-search:" "new-window 'duck \"%1\"'"

# --- Custom Tools & Scripts ---
bind D confirm-before -p "run project? (y/n)" "new-window -c #{pane_current_path} 'run-project'"
bind v run-shell "nvim-attach"

# --- Incognito Mode ---
bind Z display-menu -T "#[align=centre]Incognito" \
  -x 85% -y 0% \
  "New Window"          c       "new-window   -n incognito -c '#{pane_current_path}' -e NOHIST=1" \
  "Split Horizontal"    "%"     "split-window -h           -c '#{pane_current_path}' -e NOHIST=1" \
  "Split Vertical"      "\""    "split-window -v           -c '#{pane_current_path}' -e NOHIST=1" \
  "" \
  "New At Home"         H       "new-window   -n incognito -c '#{HOME}'              -e NOHIST=1"

# --- Session Management ---
bind s popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'sesh' tv sesh
bind r run-shell "sesh connect '#{pane_current_path}/../main' \
    || tmux display-message 'sesh: no main session'"

bind Q confirm-before -p "kill-session? (y/n)" \
    "if-shell -F '#{client_last_session}' \
        'switch-client -l' \
        'switch-client -n' \; \
    kill-session"

# --- Popups & UI ---
bind o run-shell "#{@scripts}/scratch -v --size 30%"
bind O run-shell "#{@scripts}/scratch"

# --- Quick-launch ---
bind i run-shell "#{@scripts}/scratch --kill -m opencode -- zsh -ic 'opencode'"
bind I run-shell "#{@scripts}/scratch --kill -m claude -- zsh -ic 'claude'"
bind a run-shell "#{@scripts}/bullseye -m clai -- llm-keyvar clai"

bind b new-window yazi

bind W popup -w 60% -h 70% -E nmtui
bind g popup -w 90% -h 90% -d '#{pane_current_path}' -E gitui
bind B popup -w 80% -h 70% -d '#{pane_current_path}' -E bluetui
bind R popup -w 90% -h 90% -d '#{pane_current_path}' -E taskwarrior-tui
bind S popup -w 80% -h 70% -d '#{pane_current_path}' -E 'tv channels'

# ==============================================================================
# --- Plugins ---
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @tpm-install "+";

set -g @plugin 'morantron/tmux-fingers'
set -g @fingers-key f

set -g @plugin 'maxronner/tmux-pomodoro'
source-file $XDG_CONFIG_HOME/tmux/pomodoro.conf

set -g @plugin 'maxronner/tmux-fzf-url'
set -g @fzf-url-bind 'u'

set -g @plugin 'tmux-plugins/tmux-yank'

# --- Initialize TPM (keep this at the very bottom) ---
run $XDG_CONFIG_HOME/tmux/plugins/tpm/tpm
